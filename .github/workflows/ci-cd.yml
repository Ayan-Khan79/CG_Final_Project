name: RetailX Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  #Testing, Building and Pushing to Docker Hub
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Pytest Test Suite
        run: |
          python -m pytest tests/test_main.py -v

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ayan79/retailx-backend:latest

  #Direct Continuous Deployment to Azure App Service
  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build 
    if: github.event_name == 'push'
    
    steps:
      - name: Deploy Container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'aurastream-retail-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'ayan79/retailx-backend:latest'